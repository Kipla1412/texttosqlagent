<!DOCTYPE html>
<html>

<head>
<title>Healthcare Voice Intake Agent</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
}

.container{
width:700px;
margin-top:40px;
}

.header{
text-align:center;
}

.status{
margin-top:10px;
font-size:14px;
}

.connected{color:#22c55e}
.disconnected{color:#ef4444}

.chat{
margin-top:30px;
height:350px;
overflow-y:auto;
background:#1e293b;
border-radius:10px;
padding:20px;
}

.message{
margin-bottom:15px;
}

.user{
text-align:right;
}

.user span{
background:#2563eb;
padding:10px 14px;
border-radius:12px;
}

.ai span{
background:#334155;
padding:10px 14px;
border-radius:12px;
}

.controls{
margin-top:30px;
text-align:center;
}

button{
width:120px;
height:120px;
border-radius:60px;
border:none;
background:#6366f1;
color:white;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

button.listening{
background:#ef4444;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

.loader{
margin-top:10px;
font-size:14px;
color:#94a3b8;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>Healthcare Voice Intake Agent</h1>
<div id="status" class="status disconnected">Disconnected</div>
</div>

<div id="chat" class="chat"></div>

<div class="controls">
<button id="recordBtn">🎤 Speak</button>
<div id="loader" class="loader"></div>
</div>

</div>

<script>

let socket
let stream = null
let processor = null
let source = null
let audioContext = null
let currentAudio = null
let isRecording = false

const recordBtn = document.getElementById("recordBtn")
const chat = document.getElementById("chat")
const status = document.getElementById("status")
const loader = document.getElementById("loader")

function addMessage(text,type){

const div=document.createElement("div")
div.className="message "+type

const span=document.createElement("span")
span.innerText=text

div.appendChild(span)

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

function connectSocket(){

socket=new WebSocket("ws://127.0.0.1:8000/ws/chatting")

socket.binaryType="arraybuffer"

socket.onopen=()=>{
status.innerText="Connected"
status.className="status connected"
}

socket.onclose=()=>{
status.innerText="Disconnected"
status.className="status disconnected"

setTimeout(connectSocket,2000)
}

socket.onerror=(e)=>{
console.error("WebSocket error",e)
}

socket.onmessage=(event)=>{

if(event.data instanceof ArrayBuffer){

const blob=new Blob([event.data],{type:'audio/wav'})

if(currentAudio){
currentAudio.pause()
}

currentAudio=new Audio(URL.createObjectURL(blob))

currentAudio.play().catch(err=>{
console.log("Audio play error",err)
})

return
}

let data

try{
data=JSON.parse(event.data)
}catch(err){
console.error("Invalid JSON",event.data)
return
}

if(data.type==="user_question"){

addMessage(data.content,"user")

loader.innerText="AI thinking..."

}

// if(data.type==="text"){

// loader.innerText=""

// addMessage(data.content,"ai")

// }
let currentAIMessage = null

if(data.type === "text"){

    loader.innerText = ""

    if(!currentAIMessage){
        currentAIMessage = document.createElement("div")
        currentAIMessage.className = "message ai"

        const span = document.createElement("span")
        span.id = "ai-stream"

        currentAIMessage.appendChild(span)
        chat.appendChild(currentAIMessage)
    }

    const span = document.getElementById("ai-stream")
    span.innerText += data.content

    chat.scrollTop = chat.scrollHeight
}
if(data.type==="error"){

loader.innerText=""

addMessage("Error: "+data.message,"ai")

}

}

}

connectSocket()

recordBtn.onmousedown = async () => {

if(isRecording) return

try{

stream = await navigator.mediaDevices.getUserMedia({audio:true})

audioContext = new AudioContext({sampleRate:16000})

source = audioContext.createMediaStreamSource(stream)

processor = audioContext.createScriptProcessor(2048,1,1)

source.connect(processor)
processor.connect(audioContext.destination)

isRecording = true

processor.onaudioprocess = (event)=>{

if(!isRecording) return

const input = event.inputBuffer.getChannelData(0)

const pcm16 = new Int16Array(input.length)

for(let i=0;i<input.length;i++){
pcm16[i] = Math.max(-1,Math.min(1,input[i])) * 32767
}

if(socket.readyState === WebSocket.OPEN){
socket.send(pcm16.buffer)
}

}

recordBtn.classList.add("listening")
recordBtn.innerText="Listening..."

}catch(err){

console.error(err)
status.innerText="Mic permission denied"

}

}

recordBtn.onmouseup = () => {

isRecording = false

if(processor){
processor.disconnect()
processor = null
}

if(source){
source.disconnect()
source = null
}

if(stream){
stream.getTracks().forEach(track => track.stop())
stream = null
}

if(audioContext){
audioContext.close()
audioContext = null
}

recordBtn.classList.remove("listening")
recordBtn.innerText="🎤 Speak"

}

</script>

</body>

</html>
