<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="profile-container">
        <img src="https://via.placeholder.com/150" alt="Doctor Photo" class="profile-img">
        <h1>Dr. Jane Doe</h1>
        <p class="specialty">Cardiologist</p>
        <p class="bio">Experienced specialist in treating heart diseases and promoting cardiovascular health.</p>
    </div>
    <div class="checkin-form">
        <h2>Name Check-In</h2>
        <input type="text" id="nameInput" placeholder="Enter your name">
        <button onclick="checkName()">Check In</button>
        <p id="nameMessage"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
