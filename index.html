<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Clone</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Chats</h2>
            </div>
            <ul class="contacts-list" id="contactsList">
                <!-- Contacts populated by JS -->
            </ul>
        </aside>
        <main class="chat-section">
            <div class="chat-header" id="chatHeader">
                <span class="contact-name">Select a chat</span>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="placeholder">Select a contact to start chatting</div>
            </div>
            <form class="chat-input-area" id="chatForm">
                <input type="text" id="chatInput" placeholder="Type a message" autocomplete="off" disabled>
                <button type="submit" disabled>Send</button>
            </form>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
